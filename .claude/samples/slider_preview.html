<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview: Slider vs Spinner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: #f0f0f5;
    display: flex;
    gap: 32px;
    padding: 40px;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 320px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 16px;
  }

  /* ──── CURRENT (spinner) ──── */
  .current .modal {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .current .modal-body { padding: 16px 18px 12px; }
  .current .modal-title {
    font-size: 13px;
    font-weight: 600;
    color: #161823;
    margin-bottom: 10px;
  }
  .current .row { display: flex; gap: 8px; align-items: center; }
  .current input[type=number] {
    width: 72px;
    padding: 6px 8px;
    border: 1px solid #d1d5db;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    color: #161823;
    background: #fafafa;
    text-align: center;
    -moz-appearance: textfield;
  }
  .current input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  .current .all-btn {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid #e5e7eb;
    border-radius: 7px;
    background: #fff;
    font-size: 12px;
    color: #555;
    cursor: pointer;
  }
  .current .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding: 0 18px 14px;
  }
  .current .btn-cancel {
    padding: 8px 18px;
    background: #f3f4f6;
    color: #555;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .current .btn-ok {
    padding: 8px 18px;
    background: #fe2c55;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ──── NEW (slider) ──── */
  .new .modal {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .new .modal-body { padding: 18px 20px 14px; }
  .new .modal-title {
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 14px;
  }
  .new .value-display {
    text-align: center;
    margin-bottom: 14px;
  }
  .new .value-num {
    font-size: 44px;
    font-weight: 800;
    color: #161823;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .new .value-unit {
    font-size: 14px;
    color: #9ca3af;
    margin-top: 2px;
  }
  .new .slider-wrap {
    position: relative;
    padding: 4px 0 20px;
  }
  .new input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 4px;
    background: linear-gradient(to right, #fe2c55 66%, #e5e7eb 66%);
    outline: none;
    cursor: pointer;
  }
  .new input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fe2c55;
    box-shadow: 0 1px 6px rgba(254,44,85,0.35);
    cursor: grab;
    border: 3px solid #fff;
    margin-top: -9px;
  }
  .new input[type=range]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fe2c55;
    box-shadow: 0 1px 6px rgba(254,44,85,0.35);
    cursor: grab;
    border: 3px solid #fff;
  }
  .new .slider-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #9ca3af;
    margin-top: -14px;
    padding: 0 2px;
  }
  .new .quick-btns {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }
  .new .quick-btn {
    flex: 1;
    padding: 5px 0;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    background: #fff;
    font-size: 11px;
    font-weight: 600;
    color: #555;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
  }
  .new .quick-btn:hover,
  .new .quick-btn.active {
    background: #fff0f3;
    border-color: #fe2c55;
    color: #fe2c55;
  }
  .new .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding: 0 20px 16px;
  }
  .new .btn-cancel {
    padding: 8px 18px;
    background: #f3f4f6;
    color: #555;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .new .btn-ok {
    padding: 8px 22px;
    background: #fe2c55;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(254,44,85,0.25);
  }
</style>
</head>
<body>

<!-- CURRENT -->
<div class="card current">
  <div class="card-label">ปัจจุบัน (number input)</div>
  <div class="modal">
    <div class="modal-body">
      <div class="modal-title">กี่ใบให้ กาย?</div>
      <div class="row">
        <input type="number" min="1" max="41" value="27">
        <button class="all-btn">ทั้งหมด 41</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn-cancel">ยกเลิก</button>
      <button class="btn-ok">ตกลง</button>
    </div>
  </div>
</div>

<!-- NEW SLIDER -->
<div class="card new">
  <div class="card-label">ใหม่ (horizontal slider)</div>
  <div class="modal">
    <div class="modal-body">
      <div class="modal-title">กี่ใบให้ กาย?</div>
      <div class="value-display">
        <div class="value-num" id="val">27</div>
        <div class="value-unit">ใบ</div>
      </div>
      <div class="slider-wrap">
        <input type="range" id="slider" min="1" max="41" value="27"
          oninput="updateSlider(this.value)">
        <div class="slider-ticks">
          <span>1</span>
          <span>41</span>
        </div>
      </div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="setVal(10)">10</button>
        <button class="quick-btn" onclick="setVal(20)">20</button>
        <button class="quick-btn" onclick="setVal(30)">30</button>
        <button class="quick-btn active" onclick="setVal(41)">ทั้งหมด 41</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn-cancel">ยกเลิก</button>
      <button class="btn-ok">ตกลง</button>
    </div>
  </div>
</div>

<script>
  const total = 41;

  function updateSlider(v) {
    v = parseInt(v);
    document.getElementById('val').textContent = v;
    const pct = ((v - 1) / (total - 1)) * 100;
    document.getElementById('slider').style.background =
      `linear-gradient(to right, #fe2c55 ${pct}%, #e5e7eb ${pct}%)`;
    document.querySelectorAll('.quick-btn').forEach(b => {
      const bv = b.textContent.startsWith('ทั้งหมด') ? total : parseInt(b.textContent);
      b.classList.toggle('active', bv === v);
    });
  }

  function setVal(v) {
    document.getElementById('slider').value = v;
    updateSlider(v);
  }

  updateSlider(27);
</script>
</body>
</html>
